services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: koro-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: koro
      DB_USERNAME: koro
      DB_PASSWORD: koro
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - koro

  nginx:
    image: nginx:1.27-alpine
    container_name: koro-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - koro

  mysql:
    image: mysql:8.4
    container_name: koro-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: koro
      MYSQL_USER: koro
      MYSQL_PASSWORD: koro
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - koro-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - koro

  redis:
    image: redis:7-alpine
    container_name: koro-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    networks:
      - koro

networks:
  koro:
    driver: bridge

volumes:
  koro-mysql:
